<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Constructive Build - Task Tracker Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root {
      --primary: #1a365d;
      --primary-light: #2d4a7c;
      --accent: #c9a227;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
      --card-bg: rgba(255,255,255,0.98);
      --text-primary: #1a365d;
      --text-secondary: #64748b;
      --gradient-main: linear-gradient(135deg, #1a365d 0%, #2d4a7c 50%, #1a365d 100%);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      font-family: 'Prompt', 'Segoe UI', sans-serif;
      background: var(--gradient-main);
      min-height: 100vh;
      padding: 20px;
    }
    
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding: 20px 28px;
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      flex-wrap: wrap;
      gap: 16px;
    }
    
    .logo-section { display: flex; align-items: center; gap: 16px; }
    
    .logo {
      background: linear-gradient(135deg, #c9a227 0%, #e6c65c 100%);
      color: #1a365d;
      padding: 14px 22px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 20px;
      box-shadow: 0 4px 15px rgba(201, 162, 39, 0.3);
    }
    
    .title { color: white; }
    .title h1 { font-size: 26px; font-weight: 600; }
    .title p { font-size: 14px; opacity: 0.7; }
    
    .header-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    
    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .btn-primary { background: linear-gradient(135deg, #10b981, #059669); color: white; }
    .btn-primary:hover { transform: translateY(-2px); }
    .btn-secondary { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.2); }
    .btn-secondary:hover { background: rgba(255,255,255,0.25); }
    .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
    .btn-info { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; }
    .btn-warning { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
    .btn-accent { background: linear-gradient(135deg, #c9a227, #e6c65c); color: #1a365d; }
    .btn-sm { padding: 8px 14px; font-size: 12px; }
    .btn-xs { padding: 5px 10px; font-size: 11px; }
    
    /* Language Switcher */
    .lang-switcher {
      display: flex;
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.2);
    }
    
    .lang-btn {
      padding: 8px 16px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      transition: all 0.3s;
    }
    
    .lang-btn:hover { background: rgba(255,255,255,0.1); }
    .lang-btn.active { background: rgba(255,255,255,0.25); color: white; }
    
    /* Storage Status */
    .storage-status {
      background: rgba(255,255,255,0.95);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 20px;
      font-size: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    
    .storage-ok { border-left: 5px solid #10b981; }
    .storage-error { border-left: 5px solid #ef4444; background: #fef2f2; }
    
    .storage-title { font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
    .storage-detail { color: #64748b; font-size: 13px; line-height: 1.6; }
    .storage-actions { margin-top: 12px; display: flex; gap: 10px; flex-wrap: wrap; }
    
    /* Theme Bar */
    .theme-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      flex-wrap: wrap;
    }
    
    .theme-label { color: white; font-size: 14px; font-weight: 500; }
    .theme-options { display: flex; gap: 8px; }
    
    .theme-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .theme-btn:hover { transform: scale(1.1); }
    .theme-btn.active { border-color: white; box-shadow: 0 0 0 2px rgba(255,255,255,0.3); }
    
    .theme-btn[data-theme="blue"] { background: linear-gradient(135deg, #1a365d, #2d4a7c); }
    .theme-btn[data-theme="purple"] { background: linear-gradient(135deg, #4c1d95, #7c3aed); }
    .theme-btn[data-theme="green"] { background: linear-gradient(135deg, #064e3b, #10b981); }
    .theme-btn[data-theme="red"] { background: linear-gradient(135deg, #7f1d1d, #dc2626); }
    .theme-btn[data-theme="orange"] { background: linear-gradient(135deg, #7c2d12, #ea580c); }
    .theme-btn[data-theme="teal"] { background: linear-gradient(135deg, #134e4a, #14b8a6); }
    .theme-btn[data-theme="dark"] { background: linear-gradient(135deg, #1f2937, #374151); }
    
    /* Capture Area */
    #capture-area {
      background: var(--gradient-main);
      padding: 24px;
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }
    
    .capture-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.15);
    }
    
    .capture-logo {
      background: linear-gradient(135deg, #c9a227, #e6c65c);
      color: #1a365d;
      padding: 12px 20px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 18px;
    }
    
    .capture-title { color: white; font-size: 22px; font-weight: 600; }
    .capture-date { color: rgba(255,255,255,0.6); font-size: 14px; margin-left: auto; }
    
    /* Unassigned */
    .unassigned-section {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }
    
    .unassigned-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .unassigned-title { font-size: 16px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 10px; }
    .unassigned-badge { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .unassigned-tasks { display: flex; flex-wrap: wrap; gap: 10px; min-height: 50px; }
    
    .unassigned-task {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border-radius: 10px;
      padding: 12px 16px;
      cursor: pointer;
      transition: all 0.3s;
      max-width: 280px;
    }
    
    .unassigned-task:hover { transform: translateY(-3px); }
    .unassigned-task-name { font-size: 13px; font-weight: 600; color: #78350f; margin-bottom: 4px; }
    .unassigned-task-detail { font-size: 11px; color: #92400e; }
    
    /* Org Canvas */
    .org-canvas { position: relative; min-height: 600px; }
    
    .level-zone {
      min-height: 200px;
      margin-bottom: 24px;
      padding: 20px;
      border-radius: 16px;
      background: rgba(255,255,255,0.06);
      border: 2px dashed rgba(255,255,255,0.15);
      transition: all 0.3s;
    }
    
    .level-zone.drag-over { background: rgba(16, 185, 129, 0.15); border-color: #10b981; border-style: solid; }
    
    .level-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .level-label-wrapper { display: flex; align-items: center; gap: 10px; }
    
    .level-label {
      background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.1));
      color: white;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,0.2);
      cursor: pointer;
    }
    
    .level-label:hover { background: linear-gradient(135deg, rgba(255,255,255,0.3), rgba(255,255,255,0.2)); }
    
    .level-edit-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      color: white;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }
    
    .level-edit-btn:hover { background: rgba(255,255,255,0.2); }
    .level-hint { color: rgba(255,255,255,0.4); font-size: 12px; }
    .level-cards { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; min-height: 140px; align-items: flex-start; }
    
    /* Employee Card */
    .employee-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 16px;
      width: 280px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      transition: all 0.3s;
      position: relative;
      border: 2px solid transparent;
    }
    
    .employee-card:hover { box-shadow: 0 15px 50px rgba(0,0,0,0.2); }
    .employee-card.dragging { opacity: 0.6; cursor: grabbing; }
    .employee-card.drag-over { border: 3px solid #10b981; background: #d1fae5; }
    .employee-card.selected-for-export { border: 3px solid #c9a227; }
    
    .card-top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .drag-handle { color: #cbd5e1; font-size: 14px; cursor: grab; }
    .card-actions { display: flex; gap: 4px; }
    
    .card-action-btn {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    
    .card-action-btn.edit { background: #dbeafe; color: #1e40af; }
    .card-action-btn.export { background: #fef3c7; color: #92400e; }
    .card-action-btn:hover { transform: scale(1.1); }
    
    .employee-header {
      text-align: center;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e5e7eb;
      cursor: pointer;
    }
    
    .employee-photo {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      margin: 0 auto 8px;
      border: 3px solid var(--primary);
      overflow: hidden;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
      font-weight: 600;
    }
    
    .employee-photo img { width: 100%; height: 100%; object-fit: cover; }
    .employee-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
    .employee-position { font-size: 11px; color: var(--text-secondary); }
    .employee-parent { font-size: 10px; color: #94a3b8; margin-top: 2px; }
    
    /* Task List in Card */
    .card-task-list { max-height: 200px; overflow-y: auto; margin-bottom: 10px; }
    
    .card-task-item {
      background: #f8fafc;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
      border-left: 3px solid;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .card-task-item:hover { background: #f1f5f9; transform: translateX(3px); }
    .card-task-item.pending { border-left-color: #f59e0b; }
    .card-task-item.in-progress { border-left-color: #3b82f6; }
    .card-task-item.done { border-left-color: #10b981; }
    
    .card-task-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
    .card-task-name { font-size: 12px; font-weight: 500; color: #1e293b; flex: 1; }
    .card-task-status { padding: 2px 8px; border-radius: 10px; font-size: 9px; font-weight: 600; white-space: nowrap; margin-left: 6px; }
    .card-task-status.pending { background: #fef3c7; color: #92400e; }
    .card-task-status.in-progress { background: #dbeafe; color: #1e40af; }
    .card-task-status.done { background: #d1fae5; color: #065f46; }
    .card-task-detail { font-size: 10px; color: #64748b; line-height: 1.4; }
    
    .card-add-task-btn {
      width: 100%;
      padding: 8px;
      background: #f1f5f9;
      border: 1px dashed #94a3b8;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      color: #64748b;
      font-family: inherit;
    }
    
    .card-add-task-btn:hover { background: #e2e8f0; border-color: var(--primary); color: var(--primary); }
    
    .no-tasks-msg { text-align: center; color: #94a3b8; font-size: 11px; padding: 15px; }
    
    /* Export Modal */
    .export-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(5px);
    }
    
    .export-modal.active { display: flex; }
    
    .export-modal-content {
      background: white;
      border-radius: 20px;
      padding: 28px;
      max-width: 600px;
      width: 95%;
      max-height: 85vh;
      overflow-y: auto;
    }
    
    .export-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .export-title { font-size: 20px; font-weight: 600; color: var(--text-primary); }
    
    .export-close {
      background: #f1f5f9;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      color: #64748b;
    }
    
    .export-options { margin-bottom: 20px; }
    .export-option-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: #374151; }
    .export-select-all { display: flex; gap: 10px; margin-bottom: 15px; }
    
    .employee-select-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
      max-height: 300px;
      overflow-y: auto;
      padding: 10px;
      background: #f8fafc;
      border-radius: 10px;
    }
    
    .employee-select-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      background: white;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
    }
    
    .employee-select-item:hover { background: #f1f5f9; }
    .employee-select-item.selected { border-color: #c9a227; background: #fef9e7; }
    
    .employee-select-checkbox {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      border: 2px solid #d1d5db;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: white;
      transition: all 0.2s;
    }
    
    .employee-select-item.selected .employee-select-checkbox { background: #c9a227; border-color: #c9a227; }
    
    .employee-select-info { flex: 1; }
    .employee-select-name { font-size: 13px; font-weight: 500; color: #1e293b; }
    .employee-select-pos { font-size: 10px; color: #64748b; }
    
    .export-actions { display: flex; gap: 12px; }
    .export-actions .btn { flex: 1; justify-content: center; }
    
    /* Detail Modal */
    .detail-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .detail-modal.active { display: flex; }
    
    .detail-modal-backdrop {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
    }
    
    .detail-modal-content {
      position: relative;
      background: white;
      border-radius: 24px;
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow: hidden;
      box-shadow: 0 25px 80px rgba(0,0,0,0.3);
      animation: modalSlideIn 0.3s ease;
    }
    
    @keyframes modalSlideIn {
      from { opacity: 0; transform: scale(0.9) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    
    .detail-header {
      background: var(--gradient-main);
      padding: 25px;
      text-align: center;
      position: relative;
    }
    
    .detail-close {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
    }
    
    .detail-photo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin: 0 auto 10px;
      border: 4px solid white;
      overflow: hidden;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      font-size: 28px;
      font-weight: 700;
      cursor: pointer;
    }
    
    .detail-photo img { width: 100%; height: 100%; object-fit: cover; }
    
    .detail-name { color: white; font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .detail-position { color: rgba(255,255,255,0.8); font-size: 13px; }
    .detail-parent { color: rgba(255,255,255,0.6); font-size: 11px; margin-top: 6px; }
    .detail-actions { display: flex; justify-content: center; gap: 10px; margin-top: 12px; }
    
    .detail-body { padding: 20px; max-height: 50vh; overflow-y: auto; }
    .detail-section-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
    .detail-task-list { display: flex; flex-direction: column; gap: 10px; }
    
    .detail-task-item {
      background: #f8fafc;
      border-radius: 10px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.3s;
      border-left: 4px solid;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .detail-task-item:hover { background: #f1f5f9; transform: translateX(4px); }
    .detail-task-item.pending { border-left-color: #f59e0b; }
    .detail-task-item.in-progress { border-left-color: #3b82f6; }
    .detail-task-item.done { border-left-color: #10b981; }
    
    .detail-task-info { flex: 1; }
    .detail-task-name { font-size: 13px; font-weight: 500; color: #1e293b; margin-bottom: 3px; }
    .detail-task-detail { font-size: 11px; color: #64748b; }
    
    .detail-task-status { padding: 4px 10px; border-radius: 15px; font-size: 10px; font-weight: 600; }
    .detail-task-status.pending { background: #fef3c7; color: #92400e; }
    .detail-task-status.in-progress { background: #dbeafe; color: #1e40af; }
    .detail-task-status.done { background: #d1fae5; color: #065f46; }
    
    .no-tasks-message { text-align: center; padding: 25px; color: #94a3b8; }
    .no-tasks-message span { font-size: 36px; display: block; margin-bottom: 8px; }
    
    /* Form Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(5px);
    }
    
    .modal.active { display: flex; }
    
    .modal-content {
      background: white;
      border-radius: 20px;
      padding: 28px;
      max-width: 480px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }
    
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .modal-title { font-size: 20px; font-weight: 600; color: var(--text-primary); }
    
    .modal-close {
      background: #f1f5f9;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      color: #64748b;
    }
    
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 8px; }
    
    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
    }
    
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--primary);
    }
    
    .form-actions { display: flex; gap: 12px; margin-top: 24px; }
    .form-actions .btn { flex: 1; justify-content: center; }
    
    /* Save indicator */
    .save-indicator {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 14px;

// ============ STORAGE ============
const STORAGE_KEY = 'cb_tracker_v7';
let storageAvailable = false;
let storageError = null;

function testStorage() {
  try {
    const testKey = '__test_' + Date.now();
    localStorage.setItem(testKey, 'test');
    localStorage.getItem(testKey);
    localStorage.removeItem(testKey);
    storageAvailable = true;
    storageError = null;
    return true;
  } catch (e) {
    storageAvailable = false;
    storageError = e.message;
    return false;
  }
}

function updateStorageStatus() {
  const statusEl = document.getElementById('storage-status');
  const titleEl = document.getElementById('storage-title');
  const detailEl = document.getElementById('storage-detail');
  const actionsEl = document.getElementById('storage-actions');
  
  if (storageAvailable) {
    statusEl.className = 'storage-status storage-ok';
    let totalTasks = 0;
    for (let id in tasks) totalTasks += (tasks[id] || []).length;
    titleEl.innerHTML = t('storageOk');
    detailEl.innerHTML = `<strong>${t('stats')}</strong> 👥 ${employees.length} ${t('people')} | 📋 ${totalTasks} ${t('taskCount')} | 📝 ${unassignedTasks.length} ${t('waitAssign')}`;
    actionsEl.innerHTML = `<button class="btn btn-sm btn-secondary" onclick="manualSave()">${t('saveNow')}</button>`;
  } else {
    statusEl.className = 'storage-status storage-error';
    titleEl.innerHTML = t('storageError');
    detailEl.innerHTML = `<strong>${t('storageFix')}</strong> <code>python -m http.server 8000</code>`;
    actionsEl.innerHTML = `<button class="btn btn-sm btn-info" onclick="testStorage(); updateStorageStatus();">${t('testStorage')}</button>`;
  }
}

function manualSave() {
  if (saveData()) alert(t('saveSuccess'));
  else alert(t('saveError'));
}

// ============ WORKING DATA ============
let employees = [];
let tasks = {};
let unassignedTasks = [];
let levelLabels = { ...defaultLevelLabels.th };
let currentPhotoEmployee = null;
let currentDetailEmployee = null;
let draggedEmployee = null;
let selectedForExport = new Set();

let statusLabels = { 'pending': 'รอดำเนินการ', 'in-progress': 'กำลังดำเนินการ', 'done': 'เสร็จสิ้น' };
const statusOrder = { 'pending': 0, 'in-progress': 1, 'done': 2 };

// ============ LOAD/SAVE ============
function loadData() {
  testStorage();
  
  if (storageAvailable) {
    try {
      const savedLang = localStorage.getItem('cb_lang');
      if (savedLang && translations[savedLang]) {
        currentLang = savedLang;
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.lang-btn[data-lang="${savedLang}"]`)?.classList.add('active');
      }
      const savedTheme = localStorage.getItem('cb_theme');
      if (savedTheme && themes[savedTheme]) changeTheme(savedTheme);
    } catch(e) {}
  }
  
  if (!storageAvailable) {
    useDefaultData();
    return;
  }
  
  try {
    const savedData = localStorage.getItem(STORAGE_KEY);
    if (savedData) {
      const parsed = JSON.parse(savedData);
      employees = parsed.employees || [];
      tasks = parsed.tasks || {};
      unassignedTasks = parsed.unassignedTasks || [];
      levelLabels = parsed.levelLabels || { ...defaultLevelLabels[currentLang] };
    } else {
      useDefaultData();
    }
  } catch (e) {
    useDefaultData();
  }
}

function useDefaultData() {
  employees = JSON.parse(JSON.stringify(defaultData.employees));
  tasks = JSON.parse(JSON.stringify(defaultData.tasks));
  unassignedTasks = JSON.parse(JSON.stringify(defaultData.unassignedTasks));
  levelLabels = JSON.parse(JSON.stringify(defaultLevelLabels[currentLang]));
}

function saveData() {
  if (!storageAvailable) {
    showSaveIndicator(false);
    return false;
  }
  
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ employees, tasks, unassignedTasks, levelLabels, savedAt: new Date().toISOString() }));
    showSaveIndicator(true);
    updateStorageStatus();
    return true;
  } catch (e) {
    showSaveIndicator(false);
    return false;
  }
}

function showSaveIndicator(success) {
  const indicator = document.getElementById('save-indicator');
  indicator.textContent = success ? t('saved') : t('saveFailed');
  indicator.className = 'save-indicator ' + (success ? '' : 'error');
  indicator.classList.add('show');
  setTimeout(() => indicator.classList.remove('show'), 2000);
}

function resetData() {
  if (confirm(t('confirmReset'))) {
    if (storageAvailable) try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
    useDefaultData();
    saveData();
    render();
  }
}

// ============ SORT TASKS ============
function sortTasks(taskList) {
  return [...taskList].sort((a, b) => statusOrder[a.status] - statusOrder[b.status]);
}

  const now = new Date();
  const locale = currentLang === 'th' ? 'th-TH' : 'en-US';
  document.getElementById('current-date').textContent = now.toLocaleDateString(locale, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

// ============ DRAG AND DROP ============
function handleDragStart(e, empId) {
  e.stopPropagation();
  draggedEmployee = empId;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function handleDragEnd(e) {
  draggedEmployee = null;
  e.target.classList.remove('dragging');
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
}

function handleDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function handleDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function handleDragOverCard(e) { e.preventDefault(); e.stopPropagation(); e.currentTarget.classList.add('drag-over'); }
function handleDragLeaveCard(e) { e.currentTarget.classList.remove('drag-over'); }

function handleDropOnZone(e, level) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!draggedEmployee) return;
  const emp = employees.find(emp => emp.id === draggedEmployee);
  if (!emp) return;
  emp.level = level;
  if (level === 0) emp.parent = null;
  updateChildrenLevels(emp.id, level);
  saveData(); render();
}

function handleDropOnCard(e, targetEmpId) {
  e.preventDefault();
  e.stopPropagation();
  e.currentTarget.classList.remove('drag-over');
  if (!draggedEmployee || draggedEmployee === targetEmpId) return;
  const emp = employees.find(emp => emp.id === draggedEmployee);
  const targetEmp = employees.find(emp => emp.id === targetEmpId);
  if (!emp || !targetEmp) return;
  if (isDescendant(targetEmpId, draggedEmployee)) { alert(t('cannotMove')); return; }
  emp.parent = targetEmpId;
  emp.level = targetEmp.level + 1;
  updateChildrenLevels(emp.id, emp.level);
  saveData(); render();
}

function isDescendant(possibleDescendantId, ancestorId) {
  const children = employees.filter(e => e.parent === ancestorId);
  for (const child of children) {
    if (child.id === possibleDescendantId) return true;
    if (isDescendant(possibleDescendantId, child.id)) return true;
  }
  return false;
}

function updateChildrenLevels(parentId, parentLevel) {
  employees.filter(e => e.parent === parentId).forEach(child => {
    child.level = parentLevel + 1;
    updateChildrenLevels(child.id, child.level);
  });
}

function escapeHtml(text) {
  if (!text) return '';
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

function addEmployee() {
  let parentOptions = `<option value="">${t('noSupervisor')}</option>`;
  employees.forEach(emp => {
    const name = emp.nickname ? `${emp.name} (${emp.nickname})` : emp.name;
    parentOptions += `<option value="${emp.id}">${name}</option>`;
  });
  
  openModal(t('addEmployeeTitle'), `
    <div class="form-group"><label class="form-label">${t('name')}</label><input type="text" class="form-input" id="emp-name"></div>
    <div class="form-group"><label class="form-label">${t('nickname')}</label><input type="text" class="form-input" id="emp-nickname"></div>
    <div class="form-group"><label class="form-label">${t('position')}</label><input type="text" class="form-input" id="emp-position"></div>
    <div class="form-group"><label class="form-label">${t('supervisor')}</label><select class="form-select" id="emp-parent">${parentOptions}</select></div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="saveNewEmployee()">${t('save')}</button>
      <button class="btn btn-secondary" onclick="closeModal()">${t('cancel')}</button>
    </div>
  `);
}

function saveNewEmployee() {
  const name = document.getElementById('emp-name').value.trim();
  const nickname = document.getElementById('emp-nickname').value.trim();
  const position = document.getElementById('emp-position').value.trim();
  const parentId = document.getElementById('emp-parent').value;
  
  if (!name || !position) { alert(t('pleaseEnter')); return; }
  
  let level = 0;
  if (parentId) {
    const parent = employees.find(e => e.id === parentId);
    if (parent) level = parent.level + 1;
  }
  
  const newId = 'emp_' + Date.now();
  employees.push({ id: newId, name, nickname, position, level, parent: parentId || null, photo: '' });
  tasks[newId] = [];
  
  saveData(); closeModal(); render();
}

function editEmployee(empId) {
  const emp = employees.find(e => e.id === empId);
  if (!emp) return;
  
  let parentOptions = `<option value="">${t('noSupervisor')}</option>`;
  employees.filter(e => e.id !== empId).forEach(e => {
    const name = e.nickname ? `${e.name} (${e.nickname})` : e.name;
    parentOptions += `<option value="${e.id}" ${emp.parent === e.id ? 'selected' : ''}>${name}</option>`;
  });
  
  openModal(t('editEmployeeTitle'), `
    <div class="form-group"><label class="form-label">${t('name')}</label><input type="text" class="form-input" id="emp-name" value="${escapeHtml(emp.name)}"></div>
    <div class="form-group"><label class="form-label">${t('nickname')}</label><input type="text" class="form-input" id="emp-nickname" value="${escapeHtml(emp.nickname || '')}"></div>
    <div class="form-group"><label class="form-label">${t('position')}</label><input type="text" class="form-input" id="emp-position" value="${escapeHtml(emp.position)}"></div>
    <div class="form-group"><label class="form-label">${t('supervisor')}</label><select class="form-select" id="emp-parent">${parentOptions}</select></div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="updateEmployee('${empId}')">${t('save')}</button>
      ${emp.level > 0 ? `<button class="btn btn-danger" onclick="deleteEmployee('${empId}')">${t('delete')}</button>` : ''}
    </div>
  `);
}

function updateEmployee(empId) {
  const emp = employees.find(e => e.id === empId);
  if (!emp) return;
  
  const name = document.getElementById('emp-name').value.trim();
  const nickname = document.getElementById('emp-nickname').value.trim();
  const position = document.getElementById('emp-position').value.trim();
  const parentId = document.getElementById('emp-parent').value;
  
  if (!name || !position) { alert(t('pleaseEnter')); return; }
  
  let level = 0;
  if (parentId) {
    const parent = employees.find(e => e.id === parentId);
    if (parent) level = parent.level + 1;
  }
  
  emp.name = name;
  emp.nickname = nickname;
  emp.position = position;
  emp.parent = parentId || null;
  emp.level = level;
  
  updateChildrenLevels(empId, level);
  saveData(); closeModal(); render();
}

function deleteEmployee(empId) {
  const emp = employees.find(e => e.id === empId);
  if (!emp) return;
  if (employees.filter(e => e.parent === empId).length > 0) { alert(t('cannotDelete')); return; }
  if (confirm(`${t('confirmDelete')} ${emp.name}?`)) {
    employees = employees.filter(e => e.id !== empId);
    delete tasks[empId];
    saveData(); closeModal(); render();
  }
}

// ============ TASK ============
function addTask(empId) {
  const emp = employees.find(e => e.id === empId);
  openModal(`${t('addTaskTitle')} ${emp?.nickname || emp?.name}`, `
    <div class="form-group"><label class="form-label">${t('taskName')}</label><input type="text" class="form-input" id="task-name"></div>
    <div class="form-group"><label class="form-label">${t('taskDetail')}</label><textarea class="form-textarea" id="task-detail" rows="3"></textarea></div>
    <div class="form-group"><label class="form-label">${t('status')}</label>
      <select class="form-select" id="task-status">
        <option value="pending">🟡 ${t('pending')}</option>
        <option value="in-progress">🔵 ${t('inProgress')}</option>
        <option value="done">🟢 ${t('done')}</option>
      </select>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="saveNewTask('${empId}')">${t('save')}</button>
      <button class="btn btn-secondary" onclick="closeModal()">${t('cancel')}</button>
    </div>
  `);
}

function saveNewTask(empId) {
  const name = document.getElementById('task-name').value.trim();
  const detail = document.getElementById('task-detail').value.trim();
  const status = document.getElementById('task-status').value;
  
  if (!name) { alert(t('pleaseEnterTaskName')); return; }
  if (!tasks[empId]) tasks[empId] = [];
  if (tasks[empId].length >= 10) { alert(t('taskFull')); return; }
  
  tasks[empId].push({ id: Date.now(), name, detail, status });
  saveData(); closeModal(); render();
}

function editTask(empId, taskIdx) {
  const emp = employees.find(e => e.id === empId);
  const task = tasks[empId]?.[taskIdx];
  if (!task) return;
  
  openModal(`${t('editTaskTitle')} - ${emp?.nickname || emp?.name}`, `
    <div class="form-group"><label class="form-label">${t('taskName')}</label><input type="text" class="form-input" id="task-name" value="${escapeHtml(task.name)}"></div>
    <div class="form-group"><label class="form-label">${t('taskDetail')}</label><textarea class="form-textarea" id="task-detail" rows="3">${escapeHtml(task.detail)}</textarea></div>
    <div class="form-group"><label class="form-label">${t('status')}</label>
      <select class="form-select" id="task-status">
        <option value="pending" ${task.status === 'pending' ? 'selected' : ''}>🟡 ${t('pending')}</option>
        <option value="in-progress" ${task.status === 'in-progress' ? 'selected' : ''}>🔵 ${t('inProgress')}</option>
        <option value="done" ${task.status === 'done' ? 'selected' : ''}>🟢 ${t('done')}</option>
      </select>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="updateTask('${empId}', ${taskIdx})">${t('save')}</button>
      <button class="btn btn-danger" onclick="deleteTask('${empId}', ${taskIdx})">${t('delete')}</button>
    </div>
  `);
}

function updateTask(empId, taskIdx) {
  const name = document.getElementById('task-name').value.trim();
  const detail = document.getElementById('task-detail').value.trim();
  const status = document.getElementById('task-status').value;
  
  if (!name) { alert(t('pleaseEnterTaskName')); return; }
  
  tasks[empId][taskIdx] = { ...tasks[empId][taskIdx], name, detail, status };
  saveData(); closeModal(); render();
}

function deleteTask(empId, taskIdx) {
  if (confirm(t('confirmDeleteTask'))) {
    tasks[empId].splice(taskIdx, 1);
    saveData(); closeModal(); render();
  }
}

// ============ UNASSIGNED ============
function addUnassignedTask() {
  openModal(t('addUnassignedTitle'), `
    <div class="form-group"><label class="form-label">${t('taskName')}</label><input type="text" class="form-input" id="unassigned-name"></div>
    <div class="form-group"><label class="form-label">${t('taskDetail')}</label><textarea class="form-textarea" id="unassigned-detail" rows="3"></textarea></div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="saveUnassignedTask()">${t('save')}</button>
      <button class="btn btn-secondary" onclick="closeModal()">${t('cancel')}</button>
    </div>
  `);
}

function saveUnassignedTask() {
  const name = document.getElementById('unassigned-name').value.trim();
  const detail = document.getElementById('unassigned-detail').value.trim();
  if (!name) { alert(t('pleaseEnterTaskName')); return; }
  unassignedTasks.push({ id: Date.now(), name, detail });
  saveData(); closeModal(); render();
}

function assignTask(taskIdx) {
  const task = unassignedTasks[taskIdx];
  let options = employees.map(emp => `<option value="${emp.id}">${emp.nickname ? `${emp.name} (${emp.nickname})` : emp.name}</option>`).join('');
  
  openModal(t('assignTask'), `
    <div style="background:#fef3c7;padding:14px;border-radius:10px;margin-bottom:18px;">
      <div style="font-weight:600;color:#78350f;">${escapeHtml(task.name)}</div>
      <div style="font-size:13px;color:#92400e;">${escapeHtml(task.detail)}</div>
    </div>
    <div class="form-group"><label class="form-label">${t('assignTo')}</label><select class="form-select" id="assign-to">${options}</select></div>
    <div class="form-group"><label class="form-label">${t('status')}</label>
      <select class="form-select" id="assign-status">
        <option value="pending">🟡 ${t('pending')}</option>
        <option value="in-progress">🔵 ${t('inProgress')}</option>
      </select>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="confirmAssign(${taskIdx})">${t('confirm')}</button>
      <button class="btn btn-danger" onclick="deleteUnassigned(${taskIdx})">${t('delete')}</button>
    </div>
  `);
}

function confirmAssign(taskIdx) {
  const task = unassignedTasks[taskIdx];
  const empId = document.getElementById('assign-to').value;
  const status = document.getElementById('assign-status').value;
  
  if (!tasks[empId]) tasks[empId] = [];
  if (tasks[empId].length >= 10) { alert(t('taskFull')); return; }
  
  tasks[empId].push({ id: Date.now(), name: task.name, detail: task.detail, status });
  unassignedTasks.splice(taskIdx, 1);
  saveData(); closeModal(); render();
}

function deleteUnassigned(taskIdx) {
  if (confirm(t('confirmDeleteTask'))) {
    unassignedTasks.splice(taskIdx, 1);
    saveData(); closeModal(); render();
  }
}

// ============ PHOTO ============
function handlePhotoUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = function(event) {
    const emp = employees.find(e => e.id === currentPhotoEmployee);
    if (emp) {
      emp.photo = event.target.result;
      if (saveData()) {
        render();
        if (currentDetailEmployee === currentPhotoEmployee) {
          openDetailModal(currentDetailEmployee);
        }
      }
    }
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

// ============ INIT ============
loadData();
updateUI();
render();
</script>

<!-- ===== v12 Card-level TH/EN Toggle ===== -->
<style>
.card-lang-toggle{position:absolute;top:10px;right:10px;font-size:11px}
.card-lang-toggle button{border:none;padding:4px 6px;border-radius:6px;cursor:pointer}
.card-lang-toggle button.active{background:#2563eb;color:#fff}
</style>
<script>
// store per-card language
const cardLang = {};

function setCardLang(empId,lang){
  cardLang[empId]=lang;
  render();
}

function getTaskTextByCard(task,empId){
  const lang = cardLang[empId] || currentLang || 'th';
  if(typeof task==='string') return task;
  return task[lang] || task.th || task.en || '';
}

// patch renderTaskItem if exists
const _renderTaskItem = window.renderTaskItem;
if(_renderTaskItem){
  window.renderTaskItem = function(task,empId){
    const html = _renderTaskItem(task,empId);
    return html
      .replace(task.name,getTaskTextByCard(task.name,empId))
      .replace(task.detail,getTaskTextByCard(task.detail,empId));
  }
}

// patch employee card header
const _renderEmployeeCard = window.renderEmployeeCard;
if(_renderEmployeeCard){
  window.renderEmployeeCard = function(emp){
    let html = _renderEmployeeCard(emp);
    const toggle = `
      <div class="card-lang-toggle">
        <button onclick="setCardLang('${emp.id}','th')" class="${(cardLang[emp.id]||currentLang)==='th'?'active':''}">TH</button>
        <button onclick="setCardLang('${emp.id}','en')" class="${(cardLang[emp.id]||currentLang)==='en'?'active':''}">EN</button>
      </div>`;
    return html.replace('<div class="employee-card">','<div class="employee-card" style="position:relative">'+toggle);
  }
}
</script>
<!-- ===== End v12 ===== -->

</body>
</html>
